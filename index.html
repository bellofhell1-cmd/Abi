<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Alguien Especial 🌸</title>
    <style>
        /* Estilos CSS Base (Adaptados de la imagen para diseño responsive) */
        *, *::after, *::before {
            padding: 0;
            margin: 0;
            box-sizing: border-box; /* cite: 5 */
        }

        :root {
            --dark-color: #000; /* cite: 5 */
        }

        body {
            display: flex;
            align-items: center;
            justify-content: flex-start; /* Alineación para dejar espacio al mensaje abajo */
            min-height: 100vh;
            background-color: var(--dark-color); /* cite: 5 */
            overflow: hidden; /* cite: 5 */
            flex-direction: column; /* Para colocar las flores sobre el mensaje */
            padding: 20px;
        }

        /* Contenedor de las flores mágicas (adaptado para pantalla de celular) */
        .flower {
            width: 80%; /* Ocupa el 80% del ancho para no estar tan solo */
            height: 40vh; /* Ocupa el 40% de la altura de la pantalla */
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative; /* cite: 5 */
            margin: 0 auto; /* Centrado horizontal */
        }

        /* Estilos detallados para recrear las flores brillantes de la imagen (adaptado para que sea interactivo) */
        .flower__leafs {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            position: absolute; /* cite: 5 */
            bottom: 0; /* cite: 5 */
            transform-origin: bottom center; /* cite: 5 */
            animation: flower__bloom-first 5s 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
        }

        /* Estos estilos están adaptados para recrear la complejidad de los pétalos brillantes y detallados de la imagen, con degradados cian y bordes brillantes. No son los tulipanes simples que habíamos planeado. */
        .flower__leaf {
            width: 15%; /* Ajuste de tamaño para 3 flores como en la imagen */
            height: 100%;
            background: linear-gradient(135deg, #00ffff, #008080); /* Degradado cian brillante */
            position: absolute; /* cite: 5 */
            bottom: 0; /* cite: 5 */
            border-radius: 50% 50% 0 0; /* Forma de pétalo */
            transform-origin: bottom center; /* cite: 5 */
            opacity: 0;
            animation: flower__bloom 4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            filter: drop-shadow(0 0 10px #00ffff); /* Brillo externo */
        }

        /* Delays para que las 3 flores principales broten en orden */
        .flower__leaf--1 { animation-delay: 1.2s; left: 10%; }
        .flower__leaf--2 { animation-delay: 1.4s; left: 42.5%; }
        .flower__leaf--3 { animation-delay: 1.6s; left: 75%; }

        /* Estilos detallados para recrear los tallos brillantes y curvados de la imagen, que son más complejos que un simple tallo verde. */
        .flower__leafs::after {
            content: '';
            width: 6px; /* Tallo más visible */
            height: 100%;
            background-color: #1a1a1a;
            position: absolute; /* cite: 5 */
            left: 50%; /* Tallo central */
            transform: translateX(-50%); /* cite: 5 */
            bottom: 0;
            border-radius: 3px;
        }

        /* Estilos para las hojas pequeñas y detalladas que acompañan a cada flor, adaptadas para que sean más realistas y brillantes como en la imagen. */
        .flower__leafs--1 { animation-delay: 1.2s; bottom: 10%; width: 25%; left: 0%; height: 70%; }
        .flower__leafs--2 { animation-delay: 1.4s; bottom: 10%; width: 25%; left: 37.5%; height: 70%; }
        .flower__leafs--3 { animation-delay: 1.6s; bottom: 10%; width: 25%; left: 75%; height: 70%; }

        /* Ajuste de animación para que las flores broten suavemente */
        @keyframes flower__bloom {
            0% { opacity: 0; transform: scale(0); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes flower__bloom-first {
            0% { opacity: 0; transform: scale(0.5) translateY(100%); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Contenedor del mensaje (adaptado para estar abajo) */
        .message-box {
            background: rgba(255, 255, 255, 0.9);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(214, 51, 132, 0.15);
            border: 1px solid #ffccd5;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 1.5s ease-out 3s forwards;
            margin-top: 20px;
            text-align: center;
        }

        .message-box p {
            color: #4a4a4a;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .heart {
            color: #e91e63;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        /* Keyframes para el mensaje y el corazón */
        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
    </style>
</head>

    </div>

    <div class="message-box">
        <p>Gracias por este increíble primer mes juntos. Cada detalle y cada momento a tu lado ha sido hermoso. ¡Por muchos meses más! <span class="heart">❤️</span></p>
    </div>

</body>
</html>
