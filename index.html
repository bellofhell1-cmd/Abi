<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Alguien Especial 🌸</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ffe6eb;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: min-content;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
            position: relative;
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
            z-index: 10;
        }

        h1 {
            color: #d63384;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        /* Contenedor del Jardín de Tulipanes */
        .garden {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 300px;
            width: 100%;
            margin: 20px 0;
            position: relative;
        }

        .flower-svg {
            width: 80px;
            height: 280px;
            margin: 0 -5px; /* Superposición ligera para efecto natural */
        }

        /* Animación de crecimiento */
        .stem {
            stroke: #2e7d32;
            stroke-width: 4;
            fill: none;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: grow 3.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .leaf {
            fill: #4caf50;
            opacity: 0;
            animation: fadeIn 1.5s ease-in-out 2s forwards;
        }

        /* Tulipanes con degradados rosas individuales */
        .tulip-head {
            fill: url(#tulip-gradient);
            opacity: 0;
            transform: scale(0);
            transform-origin: center bottom;
            animation: bloom 2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Delays para que no salgan todos al mismo tiempo */
        .f1 .tulip-head { animation-delay: 1.0s; } .f1 .stem { animation-delay: 0s; }
        .f2 .tulip-head { animation-delay: 1.4s; } .f2 .stem { animation-delay: 0.2s; }
        .f3 .tulip-head { animation-delay: 1.1s; } .f3 .stem { animation-delay: 0.1s; }
        .f4 .tulip-head { animation-delay: 1.6s; } .f4 .stem { animation-delay: 0.3s; }
        .f5 .tulip-head { animation-delay: 1.3s; } .f5 .stem { animation-delay: 0.15s; }

        /* Carta de texto */
        .message-box {
            background: rgba(255, 255, 255, 0.9);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(214, 51, 132, 0.15);
            border: 1px solid #ffccd5;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 1.5s ease-out 3s forwards;
            margin-top: 15px;
        }

        .message-box p {
            color: #4a4a4a;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .heart {
            color: #e91e63;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        /* Sistema de pétalos flotantes (JS) */
        .petal-fall {
            position: absolute;
            background-color: #ffb3c6;
            border-radius: 15px 2px 15px 2px;
            opacity: 0.7;
            pointer-events: none;
            z-index: 1;
            animation: fall linear forwards;
        }

        /* Keyframes */
        @keyframes grow { to { stroke-dashoffset: 0; } }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes bloom { to { opacity: 1; transform: scale(1); } }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        @keyframes fall {
            0% { transform: translateY(-10px) rotate(0deg); left: var(--start-x); }
            100% { transform: translateY(105vh) rotate(360deg); left: var(--end-x); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>¡Feliz primer mes! 🌸</h1>

        <div class="garden">
            <!-- Definición global del degradado rosa para los tulipanes -->
            <svg style="width:0; height:0; absolute:position;">
                <defs>
                    <linearGradient id="tulip-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#ff85a1;" />
                        <stop offset="50%" style="stop-color:#ff477e;" />
                        <stop offset="100%" style="stop-color:#d63384;" />
                    </linearGradient>
                </defs>
            </svg>

            <!-- Flor 1 -->
            <svg class="flower-svg f1" viewBox="0 0 100 250">
                <path class="stem" d="M 50,90 Q 40,160 55,250" />
                <path class="leaf" d="M 46,160 Q 15,150 25,135 Q 40,145 46,160" />
                <path class="tulip-head" d="M 50,90 C 25,90 20,40 50,40 C 80,40 75,90 50,90 Z M 32,70 C 35,45 50,45 50,45 C 50,45 65,45 68,70 Z" />
            </svg>

            <!-- Flor 2 -->
            <svg class="flower-svg f2" viewBox="0 0 100 250">
                <path class="stem" d="M 50,70 Q 60,150 45,250" />
                <path class="leaf" d="M 52,140 Q 80,130 70,115 Q 55,125 52,140" />
                <path class="tulip-head" d="M 50,70 C 25,70 20,20 50,20 C 80,20 75,70 50,70 Z M 32,50 C 35,25 50,25 50,25 C 50,25 65,25 68,50 Z" />
            </svg>

            <!-- Flor 3 (Centro) -->
            <svg class="flower-svg f3" viewBox="0 0 100 250">
                <path class="stem" d="M 50,50 Q 50,140 50,250" />
                <path class="leaf" d="M 50,150 Q 20,140 30,125 Q 45,135 50,150" />
                <path class="leaf" d="M 50,170 Q 80,160 70,145 Q 55,155 50,170" />
                <path class="tulip-head" d="M 50,50 C 25,50 20,0 50,0 C 80,0 75,50 50,50 Z M 32,30 C 35,5 50,5 50,5 C 50,5 65,5 68,30 Z" />
            </svg>

            <!-- Flor 4 -->
            <svg class="flower-svg f4" viewBox="0 0 100 250">
                <path class="stem" d="M 50,80 Q 45,160 52,250" />
                <path class="leaf" d="M 47,150 Q 15,140 25,125 Q 40,135 47,150" />
                <path class="tulip-head" d="M 50,80 C 25,80 20,30 50,30 C 80,30 75,80 50,80 Z M 32,60 C 35,35 50,35 50,35 C 50,35 65,35 68,60 Z" />
            </svg>

            <!-- Flor 5 -->
            <svg class="flower-svg f5" viewBox="0 0 100 250">
                <path class="stem" d="M 50,100 Q 55,170 48,250" />
                <path class="leaf" d="M 51,180 Q 80,170 70,155 Q 55,165 51,180" />
                <path class="tulip-head" d="M 50,100 C 25,100 20,50 50,50 C 80,50 75,100 50,100 Z M 32,80 C 35,55 50,55 50,55 C 50,55 65,55 68,80 Z" />
            </svg>
        </div>

        <div class="message-box">
            <p>Gracias por este increíble primer mes juntos. Cada detalle y cada momento a tu lado ha sido hermoso. ¡Por muchos meses más! <span class="heart">❤️</span></p>
        </div>
    </div>

    <script>
        // Script para generar la lluvia constante de pétalos rosas
        function createPetal() {
            const petal = document.createElement('div');
            petal.classList.add('petal-fall');
            
            // Valores aleatorios para tamaño y posiciones
            const size = Math.random() * 10 + 8; 
            petal.style.width = `${size}px`;
            petal.style.height = `${size * 1.2}px`;
            
            petal.style.setProperty('--start-x', `${Math.random() * 100}vw`);
            petal.style.setProperty('--end-x', `${Math.random() * 100}vw`);
            
            // Duración aleatoria de caída para romper la simetría
            const duration = Math.random() * 4 + 4;
            petal.style.animationDuration = `${duration}s`;

            document.body.appendChild(petal);

            // Eliminar el nodo una vez termine de caer
            setTimeout(() => {
                petal.remove();
            }, duration * 1000);
        }

        // Genera un pétalo nuevo cada 300ms
        setInterval(createPetal, 300);
    </script>
</body>
</html>
