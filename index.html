<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Alguien Especial 🌸</title>
    <style>
        *, *::after, *::before {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        :root {
            --color-bg: #000000;
            --color-glass: #111;
            --color-water: #052222;
        }

        body {
            background-color: var(--color-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
            padding: 20px;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* Contenedor del Mundo Nocturno y las Flores */
        .night {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #012 0%, #000 100%);
            z-index: 1;
        }

        .flowers {
            position: relative;
            transform: scale(0.75);
            height: 60vh;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: 2;
            margin-bottom: 20px;
        }

        /* Estructura de la Flor Principal */
        .flower {
            position: relative;
        }

        .flower__leafs {
            animation: bloom 3s 1s ease-in-out forwards;
            opacity: 0;
            position: relative;
            transform: translateY(50px);
        }

        /* El Tallo */
        .flower__line {
            width: 6px;
            height: 280px;
            background-image: linear-gradient(to top, rgba(0, 0, 0, 0), #154734, #00ffff);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            border-radius: 4px;
        }

        /* Los Pétalos Mágicos Cian */
        .flower__leaf {
            position: absolute;
            top: -20px;
            left: 50%;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, #ccffff, #00ffff 60%, #008080);
            border-radius: 50% 0 50% 50%;
            transform-origin: bottom center;
            filter: drop-shadow(0 0 15px rgba(0, 255, 255, 0.8));
            opacity: 0.9;
        }

        /* Distribución de pétalos para formar la flor abierta */
        .flower__leaf--1 { transform: translateX(-50%) rotate(0deg); }
        .flower__leaf--2 { transform: translateX(-50%) rotate(45deg); }
        .flower__leaf--3 { transform: translateX(-50%) rotate(-45deg); }
        .flower__leaf--4 { transform: translateX(-50%) rotate(90deg); }
        .flower__leaf--5 { transform: translateX(-50%) rotate(-90deg); }
        .flower__leaf--6 { transform: translateX(-50%) rotate(135deg); }
        .flower__leaf--7 { transform: translateX(-50%) rotate(-135deg); }
        .flower__leaf--8 { transform: translateX(-50%) rotate(180deg); }

        /* Hojas del tallo */
        .flower__light {
            position: absolute;
            bottom: 80px;
            left: -30px;
            width: 30px;
            height: 15px;
            background: #00ffff;
            filter: blur(5px);
            opacity: 0.4;
        }

        /* Multiplicación de flores (Izquierda y Derecha) */
        .flower--2 {
            transform: translateX(-60px) rotate(-15deg) scale(0.8);
            position: absolute;
            left: -50px;
            bottom: 0;
        }
        .flower--2 .flower__leaf {
            background: radial-gradient(circle, #e6ffff, #33ffff 60%, #006666);
        }

        .flower--3 {
            transform: translateX(60px) rotate(15deg) scale(0.8);
            position: absolute;
            right: -50px;
            bottom: 0;
        }
        .flower--3 .flower__leaf {
            background: radial-gradient(circle, #e6ffff, #33ffff 60%, #006666);
        }

        /* Cuadro de texto abajo */
        .message-box {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 255, 255, 0.2);
            border: 2px solid #ffccd5;
            max-width: 450px;
            width: 100%;
            text-align: center;
            opacity: 0;
            transform: translateY(30px);
            animation: slideUp 1.5s ease-out 2.5s forwards;
            margin-bottom: 20px;
        }

        .message-box p {
            color: #333;
            font-size: 1.05rem;
            line-height: 1.5;
        }

        .heart {
            color: #e91e63;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        /* Animaciones */
        @keyframes bloom {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <div class="night"></div>

    <div class="flowers">
        <div class="flower flower--1">
            <div class="flower__leafs">
                <div class="flower__leaf flower__leaf--1"></div>
                <div class="flower__leaf flower__leaf--2"></div>
                <div class="flower__leaf flower__leaf--3"></div>
                <div class="flower__leaf flower__leaf--4"></div>
                <div class="flower__leaf flower__leaf--5"></div>
                <div class="flower__leaf flower__leaf--6"></div>
                <div class="flower__leaf flower__leaf--7"></div>
                <div class="flower__leaf flower__leaf--8"></div>
                <div class="flower__line"></div>
            </div>
            <div class="flower__light"></div>
        </div>

        <div class="flower flower--2">
            <div class="flower__leafs" style="animation-delay: 1.4s;">
                <div class="flower__leaf flower__leaf--1"></div>
                <div class="flower__leaf flower__leaf--2"></div>
                <div class="flower__leaf flower__leaf--3"></div>
                <div class="flower__leaf flower__leaf--4"></div>
                <div class="flower__leaf flower__leaf--5"></div>
                <div class="flower__line" style="height: 220px;"></div>
            </div>
        </div>

        <div class="flower flower--3">
            <div class="flower__leafs" style="animation-delay: 1.8s;">
                <div class="flower__leaf flower__leaf--1"></div>
                <div class="flower__leaf flower__leaf--2"></div>
                <div class="flower__leaf flower__leaf--3"></div>
                <div class="flower__leaf flower__leaf--4"></div>
                <div class="flower__leaf flower__leaf--5"></div>
                <div class="flower__line" style="height: 220px;"></div>
            </div>
        </div>
    </div>

    <div class="message-box">
        <p>Gracias por este increíble primer mes juntos. Cada detalle y cada momento a tu lado ha sido hermoso. ¡Por muchos meses más! <span class="heart">❤️</span></p>
    </div>

</body>
</html>
